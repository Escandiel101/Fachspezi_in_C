<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mitarbeiter Panel - Support & Logistik</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
        }

        nav {
            width: 280px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
        }

            nav h2 {
                padding: 20px;
                background: #1a252f;
                margin: 0;
                text-align: center;
            }

            nav ul {
                list-style: none;
                padding: 0;
                margin: 0;
                flex-grow: 1;
            }

            nav li {
                padding: 15px 20px;
                border-bottom: 1px solid #3e5871;
                cursor: pointer;
                transition: background 0.2s;
            }

                nav li:hover, nav li.active-nav {
                    background: var(--accent);
                    padding-left: 25px;
                }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .active {
            display: block;
        }

        .search-box {
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            background: var(--primary);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-warning {
            background: var(--warning);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <nav>
        <h2>🛡️ Staff Panel</h2>
        <ul>
            <li id="nav-customers" class="active-nav" onclick="show('customers')">👥 Kunden-Support</li>
            <li id="nav-orders" onclick="show('orders')">📦 Bestellungen</li>
            <li id="nav-products" onclick="show('products')">🛒 Lagerverwaltung</li>
            <li onclick="window.location.href='Shop.html'" style="color: #3498db; margin-top: 20px; border-top: 1px solid #3e5871; padding-top: 20px;">🛍️ Shop-Ansicht</li>
            <li onclick="logout()" style="color: #f39c12;">🚪 Logout</li>
        </ul>
    </nav>

    <main>
        <div id="customers" class="section active">
            <h1>Kunden suchen</h1>
            <div class="search-box">
                <input type="email" id="search-email" placeholder="E-Mail Adresse eingeben..." style="flex: 1;">
                <button class="btn-success" onclick="searchCustomer()">🔍 Suchen</button>
            </div>
            <div id="customer-result"></div>
        </div>

        <div id="orders" class="section">
            <h1>Bestellung bearbeiten</h1>
            <div class="search-box">
                <input type="number" id="search-order-id" placeholder="Bestell-ID (z.B. 52)">
                <button class="btn-success" onclick="searchOrder()">📄 Laden</button>
            </div>
            <div id="order-result"></div>
        </div>

        <div id="products" class="section">
            <h1>Produkt / Lager anpassen</h1>
            <div class="search-box">
                <input type="number" id="search-prod-id" placeholder="Produkt-ID">
                <button class="btn-success" onclick="searchProduct()">📦 Bestands-Info</button>
            </div>
            <div id="product-result"></div>
        </div>
    </main>

    <script>

        // Staff nur marginale Funktionen, keine Zeit mehr um denen eine wirkliche Bedeutung zu schenken, selbst mit Vibe-Coding... die Coder sind dafür einfach zu unfähig.
        const API_URL = "/api";
        const token = sessionStorage.getItem("jwt");
        const role = sessionStorage.getItem("role");

        if (!token || role !== "Staff") window.location.href = "index.html";

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav li').forEach(li => li.classList.remove('active-nav'));
            document.getElementById('nav-' + id).classList.add('active-nav');
        }

        async function searchCustomer() {
            const email = document.getElementById('search-email').value;
            const res = await fetch(`${API_URL}/customer/findBy/${email}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) return alert("Kunde nicht gefunden.");
            const c = await res.json();
            document.getElementById('customer-result').innerHTML = `
                <table>
                    <tr><th>ID</th><td>${c.id}</td></tr>
                    <tr><th>Name</th><td>${c.firstName} ${c.lastName}</td></tr>
                    <tr><th>Adresse</th><td>${c.address}</td></tr>
                </table>`;
        }

        async function searchOrder() {
            const id = document.getElementById('search-order-id').value;
            const res = await fetch(`${API_URL}/order/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) return alert("Bestellung nicht gefunden.");
            const o = await res.json();
            document.getElementById('order-result').innerHTML = `
                <div style="padding:15px; border:1px solid #ddd;">
                    <h3>Status: ${o.status}</h3>
                    <p>Summe: ${o.grossTotal.toFixed(2)}€</p>
                    <select id="new-status-${o.id}">
                        <option value="versandt">Versandt</option>
                        <option value="abgeschlossen">Abgeschlossen</option>
                        <option value="storniert">Storniert</option>
                    </select>
                    <button onclick="updateStatus(${o.id})">Speichern</button>
                </div>`;
        }

        async function updateStatus(id) {
            const stat = document.getElementById(`new-status-${id}`).value;
            await fetch(`${API_URL}/order/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ status: stat })
            });
            alert("Status aktualisiert!");
        }

        async function searchProduct() {
            const id = document.getElementById('search-prod-id').value;
            const res = await fetch(`${API_URL}/product/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const stockRes = await fetch(`${API_URL}/product/${id}/stock`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) return alert("Produkt nicht gefunden.");
            const p = await res.json();
            const s = await stockRes.json();
            document.getElementById('product-result').innerHTML = `
                <h3>${p.name}</h3>
                <label>Bestand:</label>
                <input type="number" id="new-qty-${p.id}" value="${s.quantity}">
                <button onclick="saveStock(${p.id}, ${s.reservedQuantity})">Lager-Update</button>`;
        }

        async function saveStock(id, resQty) {
            const qty = parseInt(document.getElementById(`new-qty-${id}`).value);
            await fetch(`${API_URL}/product/${id}/stock`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ quantity: qty, reservedQuantity: resQty })
            });
            alert("Bestand gespeichert!");
        }

        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
