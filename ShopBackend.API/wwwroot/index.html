<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Shop Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #2c3e50; /* Dunkles Blau-Grau */
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Wichtig für Padding */
        }

        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

            button:hover {
                opacity: 0.9;
            }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🔐 Shop Login</h1>
        <input type="email" id="email" placeholder="E-Mail" value="admin@shop.de">
        <input type="password" id="password" placeholder="Passwort" value="Admin123!">
        <button onclick="login()">Einloggen</button>
        <div class="footer">API Port: 5139</div>
    </div>

    <script>

    // Neue Index-Seite, ohne jegliche Infos, einfach nur Login.
        const API_URL = "/api";

        async function login() {
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Login fehlgeschlagen");

                // Alles in den SessionStorage
                sessionStorage.setItem("jwt", data.token);
                sessionStorage.setItem("userId", data.id);
                sessionStorage.setItem("role", data.role);
                sessionStorage.setItem("customerId", data.customerId); // Kommt direkt vom DTO

                const userRole = String(data.role);

                // Weiterleitung
                if (userRole === "Admin" || userRole === "0")
                {
                    window.location.href = "Admin.html";
                }
                else if (userRole === "Staff" || userRole === "20")
                {
                    window.location.href = "Staff.html";
                }
                else
                {
                    window.location.href = "Shop.html";
                }

            }
            catch (err)
            {
                alert(err.message);
            }
        }
    </script>
</body>
</html>
